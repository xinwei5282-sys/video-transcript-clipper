<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>视频文案采集器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <header>
      <h1>视频文案采集器</h1>
      <p>采集抖音/小红书视频，转写为 Markdown</p>
    </header>

    <section class="share-input">
      <label for="share-url-input">视频链接</label>
      <textarea id="share-url-input" placeholder="可粘贴小红书/抖音分享文案或视频链接"></textarea>
    </section>

    <section class="actions">
      <button id="collect-btn" class="primary">采集并转写</button>
      <button id="download-btn">下载 Markdown</button>
      <button id="copy-btn">复制 Markdown</button>
      <button id="summarize-btn">复制总结请求(给飞书 bot)</button>
      <button id="obsidian-btn">导入 Obsidian</button>
      <button id="options-btn">设置 API</button>
      <button id="help-btn">使用说明</button>
      <button id="copy-log-btn">复制日志</button>
      <button id="clear-log-btn">清空日志</button>
    </section>

    <section id="result-box" class="result-box">
      <div class="result-title">最近转写结果</div>
      <textarea id="result-output" readonly></textarea>
    </section>

    <section id="diagnostics-box" class="diagnostics-box">
      <div class="diagnostics-header">
        <div class="result-title">诊断信息</div>
        <button id="toggle-log-btn" type="button">展开</button>
      </div>
      <textarea id="diagnostics-output" readonly></textarea>
    </section>

    <p id="status" class="status"></p>
  </main>
  <script src="lib/storage.js"></script>
  <script src="lib/markdown.js"></script>
  <script src="lib/extractors.js"></script>
  <script src="popup.js"></script>
</body>
</html>
